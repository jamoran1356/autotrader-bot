services:
  postgres:
    image: postgres:16-alpine
    container_name: autotrader-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: autotrader_marketplace
      POSTGRES_USER: autotrader
      POSTGRES_PASSWORD: autotrader
    ports:
      - "55432:5432"
    volumes:
      - autotrader_pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U autotrader -d autotrader_marketplace"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  autotrader_pg_data:
