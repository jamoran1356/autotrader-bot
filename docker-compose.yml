services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: autotrader-app
    env_file:
      - .env
    environment:
      NODE_ENV: production
      PORT: 3000
      DATABASE_URL: postgresql://${DATABASE_USER:-autotrader}:${DATABASE_PASSWORD:-autotrader}@postgres:5432/${DATABASE_NAME:-autotrader_marketplace}?schema=public
    depends_on:
      postgres:
        condition: service_healthy
    expose:
      - "3000"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:3000', (r) => process.exit(r.statusCode < 500 ? 0 : 1)).on('error', () => process.exit(1))"]
      interval: 15s
      timeout: 5s
      retries: 5
    networks:
      - default
      - proxy
    labels:
      - traefik.enable=true
      - traefik.docker.network=proxy
      # HTTPS
      - traefik.http.routers.autotrader.rule=Host(`autotrader.pydti.com`)
      - traefik.http.routers.autotrader.entrypoints=websecure
      - traefik.http.routers.autotrader.tls=true
      - traefik.http.routers.autotrader.tls.certresolver=le
      # HTTP → HTTPS redirect
      - traefik.http.routers.autotrader-http.rule=Host(`autotrader.pydti.com`)
      - traefik.http.routers.autotrader-http.entrypoints=web
      - traefik.http.routers.autotrader-http.middlewares=autotrader-https-redirect
      - traefik.http.middlewares.autotrader-https-redirect.redirectscheme.scheme=https
      - traefik.http.middlewares.autotrader-https-redirect.redirectscheme.permanent=true
      # Service
      - traefik.http.services.autotrader.loadbalancer.server.port=3000

  postgres:
    image: postgres:16-alpine
    container_name: autotrader-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${DATABASE_NAME:-autotrader_marketplace}
      POSTGRES_USER: ${DATABASE_USER:-autotrader}
      POSTGRES_PASSWORD: ${DATABASE_PASSWORD:-autotrader}
    volumes:
      - autotrader_pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DATABASE_USER:-autotrader} -d ${DATABASE_NAME:-autotrader_marketplace}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - default

volumes:
  autotrader_pg_data:

networks:
  default:
  proxy:
    external: true

